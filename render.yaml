services:
  - type: web
    name: nyaya-mitra-api
    env: python
    pythonVersion: 3.12.4
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false   # Set this in Render dashboard to your frontend URL
      - key: GEMINI_API_KEY
        sync: false   # Set in Render dashboard — optional, BYOK preferred
      - key: ADMIN_SECRET
        sync: false   # Generate: openssl rand -hex 32 — required for admin endpoints
      - key: QDRANT_ENABLED
        value: false
      - key: RATE_LIMIT_PER_MINUTE
        value: 10     # Requests per minute per IP on /legal-query
