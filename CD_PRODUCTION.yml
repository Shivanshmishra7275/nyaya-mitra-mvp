name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/nyaya-mitra
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=prod-

      - name: Build and push Docker image to production
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Request production approval
        run: |
          echo "⏳ Production deployment requires manual approval"
          echo "🔗 Review deployment in GitHub Actions"

      - name: Deploy to Kubernetes (Production)
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          
          # Set up kubeconfig from secrets
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          
          # Get image tag
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          
          # Update deployment image
          ./kubectl set image deployment/nyaya-mitra-api \
            nyaya-mitra=$IMAGE_TAG \
            -n production
          
          # Wait for rollout
          ./kubectl rollout status deployment/nyaya-mitra-api -n production --timeout=10m
          
          # Check pod status
          ./kubectl get pods -n production

      - name: Run production smoke tests
        run: |
          pip install requests
          python -c "
          import requests
          import time
          
          # Wait for deployment
          time.sleep(15)
          
          # Test health endpoint
          response = requests.get('http://nyaya-mitra.example.com/health', timeout=10)
          assert response.status_code == 200, f'Health check failed: {response.status_code}'
          
          # Test API
          response = requests.post('http://nyaya-mitra.example.com/legal-query', 
                                   json={'query': 'test'})
          assert response.status_code in [200, 400], f'API failed: {response.status_code}'
          
          print('✅ Production smoke tests passed')
          "

      - name: Monitor deployment health
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          
          # Set up kubeconfig
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          
          # Check pod health
          ./kubectl get pods -n production
          ./kubectl describe deployment nyaya-mitra-api -n production
          
          # Check logs
          ./kubectl logs -n production --selector=app=nyaya-mitra-api --tail=100

      - name: Notify Slack - Deployment successful
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Successful*\nCommit: `${{ github.sha }}`\nRef: `${{ github.ref }}`\nAuthor: `${{ github.actor }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Deployment failed
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Production Deployment Failed*\nCommit: `${{ github.sha }}`\nRef: `${{ github.ref }}`\nAction: Review logs"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  rollback:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    steps:
      - name: Trigger rollback
        run: |
          echo "🔄 Initiating rollback to previous production version"
          # Add your rollback logic here

      - name: Notify team of rollback
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🔄 Production rollback initiated",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔄 *Rollback Initiated*\nPrevious deployment restored"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
