name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image to staging
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nyaya-mitra:staging-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/nyaya-mitra:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Kubernetes (Staging)
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          
          # Set up kubeconfig from secrets
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          
          # Update deployment image
          ./kubectl set image deployment/nyaya-mitra-api \
            nyaya-mitra=${{ secrets.DOCKER_USERNAME }}/nyaya-mitra:staging-${{ github.sha }} \
            -n staging
          
          # Wait for rollout
          ./kubectl rollout status deployment/nyaya-mitra-api -n staging --timeout=5m

      - name: Run smoke tests against staging
        run: |
          pip install requests
          python -c "
          import requests
          import time
          
          # Wait for deployment
          time.sleep(10)
          
          # Test health endpoint
          response = requests.get('http://nyaya-mitra-staging.example.com/health')
          assert response.status_code == 200, f'Health check failed: {response.status_code}'
          
          # Test API
          response = requests.post('http://nyaya-mitra-staging.example.com/legal-query', 
                                   json={'query': 'test'})
          assert response.status_code in [200, 400], f'API failed: {response.status_code}'
          
          print('✅ Smoke tests passed')
          "

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Staging Deployment Successful*\nCommit: `${{ github.sha }}`\nBranch: `develop`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Staging Deployment Failed*\nCommit: `${{ github.sha }}`\nBranch: `develop`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
